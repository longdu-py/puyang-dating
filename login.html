<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册 - 濮阳交友网</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header>
    <div class="container nav-wrap">
        <a href="index.html" class="logo">濮阳交友</a>
        <ul class="nav-list">
            <li><a href="index.html">首页</a></li>
            <li><a href="match.html">缘分匹配</a></li>
            <li><a href="square.html">动态广场</a></li>
            <li><a href="activity.html">线下活动</a></li>
        </ul>
        <a href="login.html" class="login-btn">登录/注册</a>
    </div>
</header>

<div class="form-box">
    <h2 style="text-align:center;margin-bottom:30px;">账号登录</h2>
    <div class="form-item">
        <label>手机号</label>
        <input type="tel" id="loginPhone" placeholder="输入手机号">
    </div>
    <div class="form-item">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="输入密码">
    </div>
    <button class="submit-btn" onclick="login()">登录</button>

    <div style="margin:30px 0;text-align:center;color:#999;">———— 没有账号？立即注册 ————</div>

    <h3 style="text-align:center;margin-bottom:20px;">新用户注册</h3>
    <div class="form-item">
        <label>昵称</label>
        <input type="text" id="regName" placeholder="你的昵称">
    </div>
    <div class="form-item">
        <label>手机号</label>
        <input type="tel" id="regPhone" placeholder="用于登录">
    </div>
    <div class="form-item">
        <label>密码</label>
        <input type="password" id="regPwd" placeholder="设置6位以上密码">
    </div>
    <div class="form-item">
        <label>所在区域</label>
        <select id="regArea">
            <option value="">请选择濮阳区域</option>
            <option value="华龙区">华龙区</option>
            <option value="濮阳县">濮阳县</option>
            <option value="清丰县">清丰县</option>
            <option value="南乐县">南乐县</option>
            <option value="台前县">台前县</option>
            <option value="范县">范县</option>
        </select>
    </div>
    <button class="submit-btn" onclick="register()">完成注册</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
